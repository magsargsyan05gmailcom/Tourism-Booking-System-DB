<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Booking</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #007bff, #00c6ff);
    color: white;
    padding: 40px 20px;
    text-align: center;
}

/* SEARCH BOX */
.search-box {
    background: white;
    margin: -30px auto 40px;
    padding: 25px;
    width: 70%;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
}

.search-box input {
    padding: 12px;
    margin: 10px;
    width: 25%;
    border: 1px solid #ddd;
    border-radius: 8px;
}

.search-box button {
    padding: 12px 25px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.search-box button:hover {
    background: #0056b3;
}

/* CARDS */
.cards {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
    padding: 20px;
}

.card {
    background: white;
    width: 280px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

/* CONTENT */
.card-content {
    padding: 15px;
}

.card h3 {
    margin: 0;
}

.price {
    color: #28a745;
    font-weight: bold;
    margin: 10px 0;
}

/* BUTTON */
.card button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.card button:hover {
    background: #0056b3;
}
</style>
</head>

<body>

<header>
    <h1>🌍 Travel Booking System</h1>
    <p>Find and book your perfect trip</p>
</header>

<div class="search-box">
    <h2>Search Your Destination</h2>
    <input type="text" placeholder="Destination">
    <input type="date">
    <input type="date">
    <br>
    <button>Search</button>
</div>

<div class="cards">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34">
        <div class="card-content">
            <h3>Paris Tour</h3>
            <p>5 days in Paris</p>
            <p class="price">$1200</p>
            <button>Book Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9">
        <div class="card-content">
            <h3>Rome Trip</h3>
            <p>4 days in Rome</p>
            <p class="price">$900</p>
            <button>Book Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
        <div class="card-content">
            <h3>Barcelona Vacation</h3>
            <p>6 days in Spain</p>
            <p class="price">$1100</p>
            <button>Book Now</button>
        </div>
    </div>

</div>

</body>
</html>
